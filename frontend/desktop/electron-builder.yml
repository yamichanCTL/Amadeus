appId: com.asrapp.desktop
productName: Amadeus
icon: ../../img/Amadeus/amadeus-icon.png
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!dist-electron/electron/**/*"
extraResources:
  - from: ../../img/Amadeus
    to: img/Amadeus
    filter:
      - amadeus.jpg
      - amadeus-icon.png
      - amadeus.ico
win:
  icon: ../../img/Amadeus/amadeus-icon.png
  signAndEditExecutable: true
  signDlls: false
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
linux:
  icon: ../../img/Amadeus/amadeus-icon.png
  target:
    - AppImage
